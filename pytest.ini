[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Default run is unit-test-only. Add `--cov` (e.g. `pytest --cov`) to get
# the orchestrator-wide coverage report; configured in .coveragerc.
#
# DEV_PLAN §5.2 module thresholds — aspirational, not enforced globally:
#   state_machine / dedup / cleanup   ≥ 90%
#   dispatch / retry / scoring        ≥ 85%
#   bridge / API                      ≥ 80%
#   helpers                           ≥ 70%
# Use `pytest --cov-fail-under=N` per CI lane to enforce.
addopts = -ra --strict-markers
markers =
    M0: milestone 0 — 准备 & 基线
    M1: milestone 1 — 契约对齐
    M2: milestone 2 — 端到端最小路径
    M3: milestone 3 — UI 骨架
    M4: milestone 4 — 审稿改稿
    M5: milestone 5 — 评分调度
    M6: milestone 6 — 选题去重
    M7: milestone 7 — 重试干预
    M8: milestone 8 — 清理守护
